<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Funnel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f23;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header h2 {
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }
  .funnel-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    max-width: 340px;
    margin: 0 auto;
  }
  .funnel-stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 52px;
    border-radius: 6px;
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    opacity: 0;
    transform: scaleX(0.3);
    animation: funnelIn 0.6s ease-out forwards;
    cursor: pointer;
    overflow: hidden;
  }
  .funnel-stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .funnel-stage:hover::before { opacity: 1; }
  .funnel-stage:hover { transform: scaleX(1.03); filter: brightness(1.15); }
  .funnel-stage:nth-child(1)  { width: 100%; background: linear-gradient(135deg, #667eea, #5a67d8); animation-delay: 0.1s; }
  .funnel-stage:nth-child(3)  { width: 100%; background: linear-gradient(135deg, #5a67d8, #6366f1); animation-delay: 0.2s; }
  .funnel-stage:nth-child(5)  { width: 70%;  background: linear-gradient(135deg, #10b981, #059669); animation-delay: 0.3s; }
  .funnel-stage:nth-child(7)  { width: 45%;  background: linear-gradient(135deg, #f59e0b, #d97706); animation-delay: 0.4s; }
  .funnel-stage:nth-child(9)  { width: 30%;  background: linear-gradient(135deg, #f97316, #ea580c); animation-delay: 0.5s; }
  .funnel-stage:nth-child(11) { width: 18%;  background: linear-gradient(135deg, #ef4444, #dc2626); animation-delay: 0.6s; }
  
  @keyframes funnelIn {
    to { opacity: 1; transform: scaleX(1); }
  }
  
  .stage-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 16px;
    z-index: 1;
  }
  .stage-name { font-size: 12px; white-space: nowrap; }
  .stage-count {
    font-size: 18px;
    font-weight: 700;
    min-width: 28px;
    text-align: right;
  }
  
  .conversion-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 26px;
    opacity: 0;
    animation: fadeIn 0.5s ease-out forwards;
  }
  .conversion-arrow:nth-child(2)  { animation-delay: 0.15s; }
  .conversion-arrow:nth-child(4)  { animation-delay: 0.25s; }
  .conversion-arrow:nth-child(6)  { animation-delay: 0.35s; }
  .conversion-arrow:nth-child(8)  { animation-delay: 0.45s; }
  .conversion-arrow:nth-child(10) { animation-delay: 0.55s; }
  
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  
  .conv-rate {
    font-size: 10px;
    color: #94a3b8;
    background: rgba(255,255,255,0.04);
    padding: 2px 10px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .conv-rate .arrow-icon {
    display: inline-block;
    margin-right: 4px;
    color: #667eea;
    font-size: 9px;
  }
  
  .summary-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .summary-item {
    text-align: center;
    padding: 8px 16px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .summary-item .val {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .summary-item .lbl {
    font-size: 10px;
    color: #94a3b8;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="header">
    <h2>RECRUITMENT PIPELINE</h2>
  </div>
  
  <div class="funnel-container" id="funnel">
    <div class="funnel-stage">
      <div class="stage-label"><span class="stage-name">📥 Applied</span><span class="stage-count">6</span></div>
    </div>
    <div class="conversion-arrow"><span class="conv-rate"><span class="arrow-icon">▼</span>100%</span></div>
    <div class="funnel-stage">
      <div class="stage-label"><span class="stage-name">🔍 Evaluated</span><span class="stage-count">6</span></div>
    </div>
    <div class="conversion-arrow"><span class="conv-rate"><span class="arrow-icon">▼</span>50%</span></div>
    <div class="funnel-stage">
      <div class="stage-label"><span class="stage-name">✅ Strong</span><span class="stage-count">3</span></div>
    </div>
    <div class="conversion-arrow"><span class="conv-rate"><span class="arrow-icon">▼</span>17%</span></div>
    <div class="funnel-stage">
      <div class="stage-label"><span class="stage-name">👍 Good</span><span class="stage-count">1</span></div>
    </div>
    <div class="conversion-arrow"><span class="conv-rate"><span class="arrow-icon">▼</span>17%</span></div>
    <div class="funnel-stage">
      <div class="stage-label"><span class="stage-name">🤔 Potential</span><span class="stage-count">1</span></div>
    </div>
    <div class="conversion-arrow"><span class="conv-rate"><span class="arrow-icon">▼</span>17%</span></div>
    <div class="funnel-stage">
      <div class="stage-label"><span class="stage-name">❌ Rejected</span><span class="stage-count">1</span></div>
    </div>
  </div>
  
  <div class="summary-bar">
    <div class="summary-item">
      <div class="val">83%</div>
      <div class="lbl">Pass Rate</div>
    </div>
    <div class="summary-item">
      <div class="val">50%</div>
      <div class="lbl">Top Tier</div>
    </div>
    <div class="summary-item">
      <div class="val">17%</div>
      <div class="lbl">Reject Rate</div>
    </div>
  </div>
  
  <script>
    window.addEventListener('jet:refresh', (e) => {
      const data = e.detail;
      if (data && data.pipeline) {
        const stages = document.querySelectorAll('.funnel-stage .stage-count');
        data.pipeline.forEach((item, i) => {
          if (stages[i]) stages[i].textContent = item.count;
        });
      }
    });
  </script>
</body>
</html>
