<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Breakdown</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#0f0f23;color:#d1d5db;
    min-height:100vh;overflow:hidden;
  }

  .container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0;
    height:100vh;
    animation:fadeIn .6s ease-out;
  }

  .panel{
    padding:16px;
    display:flex;flex-direction:column;
    position:relative;
  }
  .panel:first-child{
    border-right:1px solid rgba(255,255,255,.05);
  }

  .panel-title{
    font-size:13px;font-weight:600;
    text-transform:uppercase;letter-spacing:1px;
    color:#8888aa;margin-bottom:8px;
    display:flex;align-items:center;gap:8px;
  }
  .panel-title::before{
    content:'';width:3px;height:14px;border-radius:2px;
    background:linear-gradient(180deg,#667eea,#764ba2);
  }

  .chart-area{flex:1;min-height:0}

  #radarChart,#barChart{width:100%;height:100%}
</style>
</head>
<body>
<div class="container">
  <div class="panel">
    <div class="panel-title">Average Dimension Scores</div>
    <div class="chart-area" id="radarChart"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Candidate Overall Scores</div>
    <div class="chart-area" id="barChart"></div>
  </div>
</div>

<script>
(function(){
  const candidates=[
    {name:'John Doe (#1)',score:88,status:'Strong Match',color:'#34d399'},
    {name:'John Doe (#2)',score:88,status:'Strong Match',color:'#34d399'},
    {name:'tannu (#3)',score:87,status:'Strong Match',color:'#34d399'},
    {name:'John Doe (#4)',score:82,status:'Good Match',color:'#fbbf24'},
    {name:'tannu (#5)',score:64,status:'Potential Match',color:'#fb923c'},
    {name:'uio (#6)',score:55,status:'Poor Match',color:'#f87171'},
  ];

  const dimensions=['Skill Match','Experience','Culture Fit','Risk Assessment'];
  const avgScores=[75.2,72.0,77.7,80.5];

  // ---- Radar Chart ----
  const radarData=[{
    type:'scatterpolar',
    r:[...avgScores,avgScores[0]],
    theta:[...dimensions,dimensions[0]],
    fill:'toself',
    fillcolor:'rgba(102,126,234,.15)',
    line:{color:'#667eea',width:2.5},
    marker:{size:7,color:'#a5b4fc',line:{color:'#667eea',width:2}},
    hovertemplate:'%{theta}: %{r:.1f}<extra></extra>',
    name:'Avg Score',
  }];

  const radarLayout={
    polar:{
      bgcolor:'transparent',
      angularaxis:{
        linecolor:'rgba(255,255,255,.08)',
        gridcolor:'rgba(255,255,255,.06)',
        tickfont:{color:'#a5b4fc',size:11,family:'Segoe UI'},
      },
      radialaxis:{
        visible:true,range:[0,100],
        linecolor:'rgba(255,255,255,.05)',
        gridcolor:'rgba(255,255,255,.04)',
        tickfont:{color:'#6b6b8d',size:10},
        tickvals:[20,40,60,80,100],
      },
    },
    paper_bgcolor:'transparent',
    plot_bgcolor:'transparent',
    margin:{t:30,r:40,b:30,l:40},
    showlegend:false,
    font:{family:'Segoe UI',color:'#d1d5db'},
  };

  Plotly.newPlot('radarChart',radarData,radarLayout,{
    responsive:true,displayModeBar:false,
  });

  // ---- Horizontal Bar Chart ----
  const sorted=[...candidates].sort((a,b)=>a.score-b.score);

  const barData=[{
    type:'bar',
    y:sorted.map(c=>c.name),
    x:sorted.map(c=>c.score),
    orientation:'h',
    marker:{
      color:sorted.map(c=>c.color),
      line:{color:sorted.map(c=>c.color.replace(')',',0.6)').replace('rgb','rgba')),width:0},
      opacity:0.85,
    },
    text:sorted.map(c=>c.score+' — '+c.status),
    textposition:'inside',
    textfont:{color:'#fff',size:12,family:'Segoe UI'},
    insidetextanchor:'end',
    hovertemplate:'%{y}<br>Score: %{x}<extra></extra>',
  }];

  const barLayout={
    paper_bgcolor:'transparent',
    plot_bgcolor:'transparent',
    margin:{t:10,r:20,b:40,l:100},
    xaxis:{
      range:[0,100],
      gridcolor:'rgba(255,255,255,.04)',
      zerolinecolor:'rgba(255,255,255,.06)',
      tickfont:{color:'#6b6b8d',size:11},
      title:{text:'Overall Score',font:{color:'#6b6b8d',size:11}},
    },
    yaxis:{
      tickfont:{color:'#a5b4fc',size:12,family:'Segoe UI'},
      automargin:true,
    },
    bargap:0.25,
    font:{family:'Segoe UI',color:'#d1d5db'},
    showlegend:false,
  };

  Plotly.newPlot('barChart',barData,barLayout,{
    responsive:true,displayModeBar:false,
  });

  // Jetro refresh
  window.addEventListener('jet:refresh',(e)=>{
    const d=e.detail||{};
    if(d.avgScores){
      const newR=[...d.avgScores,d.avgScores[0]];
      Plotly.restyle('radarChart',{r:[newR]});
    }
    if(d.candidates){
      const s=[...d.candidates].sort((a,b)=>a.score-b.score);
      Plotly.restyle('barChart',{
        y:[s.map(c=>c.name)],
        x:[s.map(c=>c.score)],
        'marker.color':[s.map(c=>c.color)],
        text:[s.map(c=>c.score+' — '+c.status)],
      });
    }
  });
})();
</script>
</body>
</html>
