<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Overview</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
  @keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
  @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(102,126,234,.15)}50%{box-shadow:0 0 40px rgba(102,126,234,.3)}}

  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#0f0f23;
    color:#e0e0e0;
    min-height:100vh;
    overflow:hidden;
    position:relative;
  }
  body::before{
    content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
    background:radial-gradient(ellipse at 30% 20%,rgba(102,126,234,.08) 0%,transparent 50%),
               radial-gradient(ellipse at 70% 80%,rgba(118,75,162,.06) 0%,transparent 50%);
    pointer-events:none;z-index:0;
  }

  .dashboard{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    padding:24px;
    height:100vh;
    position:relative;z-index:1;
  }

  .card{
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:28px;
    position:relative;
    overflow:hidden;
    cursor:default;
    animation:fadeInUp .7s ease-out both;
    transition:all .4s cubic-bezier(.25,.46,.45,.94);
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .card:nth-child(1){animation-delay:.1s}
  .card:nth-child(2){animation-delay:.2s}
  .card:nth-child(3){animation-delay:.3s}
  .card:nth-child(4){animation-delay:.4s}

  .card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,#667eea,#764ba2);
    opacity:.8;transition:opacity .3s;
  }
  .card::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(102,126,234,.06) 0%,rgba(118,75,162,.03) 100%);
    pointer-events:none;border-radius:20px;
  }

  .card:hover{
    transform:translateY(-4px);
    border-color:rgba(102,126,234,.3);
    animation:glowPulse 2s ease-in-out infinite;
  }
  .card:hover::before{opacity:1}

  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;position:relative;z-index:1}

  .card-icon{
    width:44px;height:44px;border-radius:14px;
    background:linear-gradient(135deg,rgba(102,126,234,.2),rgba(118,75,162,.2));
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
    border:1px solid rgba(102,126,234,.15);
  }

  .card-badge{
    font-size:11px;font-weight:600;
    padding:4px 10px;border-radius:20px;
    background:rgba(102,126,234,.15);
    color:#a5b4fc;letter-spacing:.3px;
  }
  .card-badge.up{background:rgba(52,211,153,.12);color:#6ee7b7}
  .card-badge.neutral{background:rgba(251,191,36,.12);color:#fcd34d}

  .card-label{
    font-size:12px;font-weight:500;color:#8888aa;
    text-transform:uppercase;letter-spacing:1.2px;
    margin-bottom:4px;position:relative;z-index:1;
  }

  .card-value{
    font-size:42px;font-weight:700;
    background:linear-gradient(135deg,#e0e7ff,#c4b5fd);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    line-height:1.1;
    position:relative;z-index:1;
    animation:countUp .6s ease-out both;
  }

  .card-sub{font-size:12px;color:#6b6b8d;margin-top:2px;position:relative;z-index:1}

  .sparkline-container{
    margin-top:12px;height:40px;position:relative;z-index:1;
    opacity:.7;transition:opacity .3s;
  }
  .card:hover .sparkline-container{opacity:1}

  .sparkline{display:flex;align-items:flex-end;gap:3px;height:100%}
  .spark-bar{
    flex:1;border-radius:3px 3px 0 0;
    background:linear-gradient(to top,rgba(102,126,234,.3),rgba(118,75,162,.5));
    transition:all .3s;min-width:4px;
  }
  .card:hover .spark-bar{background:linear-gradient(to top,rgba(102,126,234,.5),rgba(118,75,162,.8))}

  .sparkline-line{position:absolute;inset:0}
  .sparkline-line svg{width:100%;height:100%}
  .sparkline-line path{
    fill:none;stroke:url(#sparkGrad);stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round;
  }
  .sparkline-line .area{
    fill:url(#sparkAreaGrad);stroke:none;opacity:.3;
  }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="sparkAreaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#667eea" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>

<div class="dashboard">
  <!-- Total Candidates -->
  <div class="card" id="card-total">
    <div>
      <div class="card-header">
        <div class="card-icon">👥</div>
        <div class="card-badge up">▲ Active</div>
      </div>
      <div class="card-label">Total Candidates</div>
      <div class="card-value" data-target="6">0</div>
      <div class="card-sub">Currently in pipeline</div>
    </div>
    <div class="sparkline-container">
      <div class="sparkline" id="spark-total"></div>
    </div>
  </div>

  <!-- Avg Score -->
  <div class="card" id="card-score">
    <div>
      <div class="card-header">
        <div class="card-icon">📊</div>
        <div class="card-badge up">▲ Good</div>
      </div>
      <div class="card-label">Average Score</div>
      <div class="card-value" data-target="77.3" data-decimal="1">0</div>
      <div class="card-sub">Across all evaluations</div>
    </div>
    <div class="sparkline-container">
      <div class="sparkline-line" id="spark-score"></div>
    </div>
  </div>

  <!-- Strong Matches -->
  <div class="card" id="card-match">
    <div>
      <div class="card-header">
        <div class="card-icon">🎯</div>
        <div class="card-badge up">50%</div>
      </div>
      <div class="card-label">Strong Matches</div>
      <div class="card-value" data-target="3">0</div>
      <div class="card-sub">Out of 6 evaluated candidates</div>
    </div>
    <div class="sparkline-container">
      <div class="sparkline" id="spark-match"></div>
    </div>
  </div>

  <!-- Pipeline Conversion -->
  <div class="card" id="card-convert">
    <div>
      <div class="card-header">
        <div class="card-icon">🚀</div>
        <div class="card-badge neutral">Steady</div>
      </div>
      <div class="card-label">Pipeline Conversion</div>
      <div class="card-value" data-target="83" data-suffix="%">0</div>
      <div class="card-sub">Candidates advancing forward</div>
    </div>
    <div class="sparkline-container">
      <div class="sparkline-line" id="spark-convert"></div>
    </div>
  </div>
</div>

<script>
(function(){
  // Animated counters
  function animateCounters(){
    document.querySelectorAll('.card-value').forEach(el=>{
      const target=parseFloat(el.dataset.target);
      const decimal=parseInt(el.dataset.decimal)||0;
      const suffix=el.dataset.suffix||'';
      const duration=1800;
      const start=performance.now();
      function tick(now){
        const elapsed=now-start;
        const progress=Math.min(elapsed/duration,1);
        const eased=1-Math.pow(1-progress,4);
        const current=eased*target;
        el.textContent=(decimal?current.toFixed(decimal):Math.round(current))+suffix;
        if(progress<1)requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    });
  }

  // Bar sparklines
  function createBarSparkline(id,data){
    const container=document.getElementById(id);
    if(!container)return;
    const max=Math.max(...data);
    data.forEach((v,i)=>{
      const bar=document.createElement('div');
      bar.className='spark-bar';
      bar.style.height=(v/max*100)+'%';
      bar.style.animationDelay=(i*0.05)+'s';
      container.appendChild(bar);
    });
  }

  // Line sparklines
  function createLineSparkline(id,data){
    const container=document.getElementById(id);
    if(!container)return;
    const w=200,h=40;
    const max=Math.max(...data),min=Math.min(...data);
    const range=max-min||1;
    const points=data.map((v,i)=>{
      const x=(i/(data.length-1))*w;
      const y=h-((v-min)/range)*h*0.85-2;
      return{x,y};
    });
    const pathD=points.map((p,i)=>((i===0?'M':'L')+p.x+','+p.y)).join(' ');
    const areaD=pathD+' L'+w+','+h+' L0,'+h+' Z';
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 '+w+' '+h);
    svg.setAttribute('preserveAspectRatio','none');
    svg.style.width='100%';svg.style.height='100%';

    const area=document.createElementNS('http://www.w3.org/2000/svg','path');
    area.setAttribute('d',areaD);area.classList.add('area');
    const line=document.createElementNS('http://www.w3.org/2000/svg','path');
    line.setAttribute('d',pathD);

    svg.appendChild(area);svg.appendChild(line);
    container.appendChild(svg);
  }

  // Init
  setTimeout(animateCounters,300);
  createBarSparkline('spark-total',[2,3,4,3,5,4,6,5,6]);
  createLineSparkline('spark-score',[62,68,71,74,70,73,75,77,77.3]);
  createBarSparkline('spark-match',[1,1,2,2,2,3,3,3,3]);
  createLineSparkline('spark-convert',[70,72,78,80,75,82,85,83,83]);

  // Jetro refresh listener
  window.addEventListener('jet:refresh',(e)=>{
    const d=e.detail||{};
    if(d.totalCandidates!==undefined){
      const el=document.querySelector('#card-total .card-value');
      el.dataset.target=d.totalCandidates;
    }
    if(d.avgScore!==undefined){
      const el=document.querySelector('#card-score .card-value');
      el.dataset.target=d.avgScore;
    }
    if(d.strongMatches!==undefined){
      const el=document.querySelector('#card-match .card-value');
      el.dataset.target=d.strongMatches;
    }
    if(d.conversion!==undefined){
      const el=document.querySelector('#card-convert .card-value');
      el.dataset.target=d.conversion;
    }
    animateCounters();
  });
})();
</script>
</body>
</html>
