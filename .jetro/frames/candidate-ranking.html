<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Ranking</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  @keyframes fadeInRow{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#0f0f23;color:#d1d5db;
    min-height:100vh;padding:20px;overflow-x:hidden;
  }

  .header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:16px;animation:slideDown .5s ease-out;
  }
  .header h2{
    font-size:16px;font-weight:600;
    background:linear-gradient(135deg,#e0e7ff,#c4b5fd);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .header .count{
    font-size:12px;color:#6b6b8d;
    background:rgba(102,126,234,.1);
    padding:4px 12px;border-radius:20px;
    border:1px solid rgba(102,126,234,.15);
  }

  .search-bar{
    position:relative;margin-bottom:16px;
    animation:slideDown .5s ease-out .1s both;
  }
  .search-bar input{
    width:100%;padding:10px 16px 10px 40px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;color:#e0e0e0;
    font-size:13px;outline:none;
    transition:all .3s;
  }
  .search-bar input:focus{
    border-color:rgba(102,126,234,.4);
    background:rgba(255,255,255,.06);
    box-shadow:0 0 20px rgba(102,126,234,.1);
  }
  .search-bar input::placeholder{color:#4a4a6a}
  .search-bar .icon{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    font-size:14px;color:#6b6b8d;pointer-events:none;
  }

  .table-container{
    background:rgba(255,255,255,.02);
    border:1px solid rgba(255,255,255,.06);
    border-radius:16px;overflow:hidden;
  }

  table{width:100%;border-collapse:collapse}

  thead th{
    padding:12px 14px;text-align:left;
    font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:.8px;
    color:#6b6b8d;
    background:rgba(255,255,255,.03);
    border-bottom:1px solid rgba(255,255,255,.06);
    position:sticky;top:0;
  }

  tbody tr{
    border-bottom:1px solid rgba(255,255,255,.03);
    transition:all .3s;
    animation:fadeInRow .5s ease-out both;
  }
  tbody tr:nth-child(1){animation-delay:.15s}
  tbody tr:nth-child(2){animation-delay:.22s}
  tbody tr:nth-child(3){animation-delay:.29s}
  tbody tr:nth-child(4){animation-delay:.36s}
  tbody tr:nth-child(5){animation-delay:.43s}
  tbody tr:nth-child(6){animation-delay:.50s}

  tbody tr:nth-child(even){background:rgba(255,255,255,.015)}
  tbody tr:hover{background:rgba(102,126,234,.08)!important}

  td{padding:12px 14px;font-size:13px;white-space:nowrap}

  .rank{
    width:36px;height:36px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;
  }
  .rank-1{background:linear-gradient(135deg,rgba(250,204,21,.2),rgba(245,158,11,.2));color:#fcd34d;border:1px solid rgba(250,204,21,.2)}
  .rank-2{background:linear-gradient(135deg,rgba(156,163,175,.2),rgba(107,114,128,.2));color:#d1d5db;border:1px solid rgba(156,163,175,.2)}
  .rank-3{background:linear-gradient(135deg,rgba(180,83,9,.2),rgba(217,119,6,.2));color:#fbbf24;border:1px solid rgba(180,83,9,.2)}
  .rank-default{background:rgba(255,255,255,.05);color:#6b6b8d;border:1px solid rgba(255,255,255,.05)}

  .name-cell{display:flex;align-items:center;gap:10px}
  .avatar{
    width:32px;height:32px;border-radius:10px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;color:#fff;
    flex-shrink:0;
  }
  .name-text{font-weight:500;color:#e0e7ff}

  .score-cell{display:flex;align-items:center;gap:10px}
  .score-num{font-weight:700;font-size:15px;min-width:28px}
  .score-bar-bg{
    flex:1;height:6px;border-radius:3px;
    background:rgba(255,255,255,.06);
    min-width:50px;max-width:80px;overflow:hidden;
  }
  .score-bar-fill{
    height:100%;border-radius:3px;
    transition:width 1s ease-out;
  }

  .badge{
    display:inline-flex;align-items:center;gap:4px;
    padding:4px 10px;border-radius:20px;
    font-size:11px;font-weight:600;letter-spacing:.3px;
  }
  .badge-strong{background:rgba(52,211,153,.12);color:#6ee7b7;border:1px solid rgba(52,211,153,.15)}
  .badge-good{background:rgba(250,204,21,.12);color:#fcd34d;border:1px solid rgba(250,204,21,.15)}
  .badge-potential{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.15)}
  .badge-poor{background:rgba(248,113,113,.12);color:#fca5a5;border:1px solid rgba(248,113,113,.15)}

  .badge::before{
    content:'';width:6px;height:6px;border-radius:50%;
  }
  .badge-strong::before{background:#34d399}
  .badge-good::before{background:#fbbf24}
  .badge-potential::before{background:#fb923c}
  .badge-poor::before{background:#f87171}

  .pct{color:#a5b4fc;font-weight:500}
  .rec{font-size:12px;color:#8888aa;max-width:180px;white-space:normal;line-height:1.4}

  .no-results{
    text-align:center;padding:40px;color:#4a4a6a;
    font-size:14px;display:none;
  }
</style>
</head>
<body>
<div class="header">
  <h2>Candidate Ranking</h2>
  <div class="count" id="countBadge">6 candidates</div>
</div>

<div class="search-bar">
  <span class="icon">🔍</span>
  <input type="text" id="searchInput" placeholder="Search candidates by name, status, or recommendation..." />
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Name</th>
        <th>Score</th>
        <th>Status</th>
        <th>Skill Match</th>
        <th>Culture Fit</th>
        <th>Recommendation</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="no-results" id="noResults">No candidates match your search.</div>
</div>

<script>
(function(){
  const candidates=[
    {rank:1,name:"John Doe",score:88,status:"Strong Match",statusClass:"strong",skill:92,culture:85,rec:"Move to technical interview"},
    {rank:2,name:"John Doe",score:88,status:"Strong Match",statusClass:"strong",skill:92,culture:85,rec:"Move to technical interview"},
    {rank:3,name:"tannu",score:87,status:"Strong Match",statusClass:"strong",skill:100,culture:74,rec:"Move to technical interview"},
    {rank:4,name:"John Doe",score:82,status:"Good Match",statusClass:"good",skill:100,culture:74,rec:"Consider for technical interview"},
    {rank:5,name:"tannu",score:64,status:"Potential Match",statusClass:"potential",skill:67,culture:74,rec:"Conduct short HR screening"},
    {rank:6,name:"uio",score:55,status:"Poor Match",statusClass:"poor",skill:0,culture:74,rec:"Do not advance"},
  ];

  function getInitials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
  function getRankClass(r){return r<=3?'rank-'+r:'rank-default'}
  function scoreColor(s){
    if(s>=85)return'#34d399';
    if(s>=75)return'#fbbf24';
    if(s>=60)return'#fb923c';
    return'#f87171';
  }

  function renderTable(data){
    const tbody=document.getElementById('tableBody');
    const noRes=document.getElementById('noResults');
    const badge=document.getElementById('countBadge');
    tbody.innerHTML='';
    if(data.length===0){noRes.style.display='block';badge.textContent='0 candidates';return;}
    noRes.style.display='none';
    badge.textContent=data.length+' candidate'+(data.length!==1?'s':'');

    data.forEach((c,i)=>{
      const tr=document.createElement('tr');
      tr.style.animationDelay=(i*0.07+0.1)+'s';
      tr.innerHTML=`
        <td><div class="rank ${getRankClass(c.rank)}">${c.rank}</div></td>
        <td><div class="name-cell"><div class="avatar">${getInitials(c.name)}</div><span class="name-text">${c.name}</span></div></td>
        <td><div class="score-cell"><span class="score-num" style="color:${scoreColor(c.score)}">${c.score}</span><div class="score-bar-bg"><div class="score-bar-fill" style="width:${c.score}%;background:${scoreColor(c.score)}"></div></div></div></td>
        <td><span class="badge badge-${c.statusClass}">${c.status}</span></td>
        <td><span class="pct">${c.skill}%</span></td>
        <td><span class="pct">${c.culture}%</span></td>
        <td><span class="rec">${c.rec}</span></td>
      `;
      tbody.appendChild(tr);
    });
  }

  renderTable(candidates);

  document.getElementById('searchInput').addEventListener('input',function(){
    const q=this.value.toLowerCase().trim();
    if(!q){renderTable(candidates);return;}
    const filtered=candidates.filter(c=>
      c.name.toLowerCase().includes(q)||
      c.status.toLowerCase().includes(q)||
      c.rec.toLowerCase().includes(q)||
      String(c.score).includes(q)
    );
    renderTable(filtered);
  });

  window.addEventListener('jet:refresh',(e)=>{
    const d=e.detail;
    if(d&&d.candidates){
      candidates.length=0;
      d.candidates.forEach(c=>candidates.push(c));
      renderTable(candidates);
    }
  });
})();
</script>
</body>
</html>
