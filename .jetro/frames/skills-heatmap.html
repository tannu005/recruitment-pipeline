<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills Heatmap</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f0f23;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .header {
    text-align: center;
    margin-bottom: 8px;
    width: 100%;
  }
  .header h2 {
    font-size: 14px;
    font-weight: 600;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }
  #heatmap {
    width: 100%;
    height: calc(100vh - 60px);
    min-height: 280px;
  }
</style>
</head>
<body>
  <div class="header">
    <h2>SKILLS GAP ANALYSIS</h2>
  </div>
  <div id="heatmap"></div>
  
  <script>
    const candidates = ['John D.(1)', 'John D.(2)', 'Tannu(1)', 'Uio', 'John D.(3)', 'Tannu(2)'];
    const skills = ['Node.js', 'React', 'PostgreSQL', 'Kubernetes', 'TypeScript'];
    
    // Skill match data based on actual evaluation scores
    // 1 = has skill, 0.5 = partial, 0 = missing
    const z = [
      [1,   1,   1,   0,   0.7],  // John Doe 1 - 92% skill
      [1,   1,   1,   0,   0.7],  // John Doe 2 - 92% skill
      [1,   1,   1,   0.5, 0.8],  // Tannu 1 - 100% skill
      [0,   0,   0,   0,   0  ],  // Uio - 0% skill
      [1,   1,   1,   0.3, 0.8],  // John Doe 3 - 100% skill
      [1,   1,   0,   0,   0.5],  // Tannu 2 - 67% skill
    ];
    
    // Custom annotations
    const annotations = [];
    for (let i = 0; i < candidates.length; i++) {
      for (let j = 0; j < skills.length; j++) {
        const val = z[i][j];
        annotations.push({
          x: skills[j],
          y: candidates[i],
          text: val >= 0.8 ? '✓' : val >= 0.3 ? '~' : '✗',
          font: {
            color: val >= 0.8 ? '#10b981' : val >= 0.3 ? '#f59e0b' : '#ef4444',
            size: 14,
            family: 'system-ui'
          },
          showarrow: false
        });
      }
    }
    
    const data = [{
      z: z,
      x: skills,
      y: candidates,
      type: 'heatmap',
      colorscale: [
        [0,    '#1a0a2e'],
        [0.25, '#3b1261'],
        [0.5,  '#764ba2'],
        [0.75, '#667eea'],
        [1,    '#10b981']
      ],
      showscale: true,
      colorbar: {
        title: { text: 'Match', font: { color: '#94a3b8', size: 10 } },
        tickfont: { color: '#94a3b8', size: 9 },
        len: 0.6,
        thickness: 12,
        outlinewidth: 0
      },
      hoverongaps: false,
      hovertemplate: '<b>%{y}</b><br>%{x}: %{z:.0%}<extra></extra>'
    }];
    
    const layout = {
      paper_bgcolor: '#0f0f23',
      plot_bgcolor: '#0f0f23',
      font: { color: '#e0e0e0', family: 'system-ui', size: 10 },
      margin: { l: 80, r: 40, t: 10, b: 50 },
      xaxis: {
        side: 'bottom',
        tickangle: -30,
        tickfont: { size: 10, color: '#94a3b8' },
        gridcolor: 'rgba(255,255,255,0.03)'
      },
      yaxis: {
        autorange: 'reversed',
        tickfont: { size: 9, color: '#94a3b8' },
        gridcolor: 'rgba(255,255,255,0.03)'
      },
      annotations: annotations
    };
    
    const config = {
      responsive: true,
      displayModeBar: false
    };
    
    Plotly.newPlot('heatmap', data, layout, config);
    
    window.addEventListener('jet:refresh', (e) => {
      const detail = e.detail;
      if (detail && detail.heatmapData) {
        Plotly.restyle('heatmap', { z: [detail.heatmapData] });
      }
    });
  </script>
</body>
</html>
