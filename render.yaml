services:
  - type: web
    name: recruitment-pipeline
    env: node
    plan: free
    rootDir: .
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JETRO_API_KEY
        value: your_jetro_api_key_here
